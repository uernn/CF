name: Auto Fetch & Deduplicate IPv4 List

on:
  schedule:
    # 每天 UTC 时间 0 点（北京时间早上 8 点）自动执行一次
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许在 GitHub 网页端手动点击运行

jobs:
  update-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch, Clean and Deduplicate IP list
        # 下载 -> 删除回车符 -> 删除首尾行 -> 过滤空行并去重 -> 保存
        run: |
          curl -sL https://bestcf.pages.dev/xinyitang3/ipv4.txt | tr -d '\r' | sed '1d;$d' | awk 'NF && !seen[$0]++' > ipv4.txt

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ipv4.txt
          
          if git diff --staged --quiet; then
            echo "文件内容无实质变化，无需提交"
          else
            git commit -m "Auto-update: strip header/footer and deduplicate"
            git push
          fi
